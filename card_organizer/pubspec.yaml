name: card_organizer
description: A Flutter app to organize playing cards into suit folders using SQLite.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=2.18.0 <3.0.0'

dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.0.3
  sqflite_common_ffi: ^2.3.0
  path: ^1.8.0
  path_provider: ^2.0.11
  image_picker: ^0.8.6
  http: ^0.13.0
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true